name: Ingestión y Preprocesamiento de Datos

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 0 * * *" # Ejecutar diariamente a la medianoche
  workflow_dispatch: # Permitir ejecución manual desde la interfaz de GitHub

jobs:
  ingestion:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl

      # ---- EA1: Ejecución del script de ingesta ----
      - name: Ejecutar script de ingesta (EA1)
        run: |
          python src/ingestion.py

      - name: Subir artefactos EA1 (Base de Datos, Muestra y Auditoría)
        uses: actions/upload-artifact@v4
        with:
          name: evidencias-ingestion
          path: |
            src/db/ingestion.db
            src/xlsx/ingestion.xlsx
            src/static/auditoria/ingestion.txt

      # ---- EA2: Ejecución del script de preprocesamiento y limpieza ----
      - name: Ejecutar script de limpieza (EA2)
        run: |
          python src/cleaning.py

      - name: Subir artefactos EA2 (Datos Limpios y Auditoría de Limpieza)
        uses: actions/upload-artifact@v4
        with:
          name: evidencias-cleaning
          path: |
            src/xlsx/cleaned_data.xlsx
            src/static/auditoria/cleaning_report.txt
