name: Pipeline Big Data (Ingestión → Limpieza → Enriquecimiento)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 0 * * *" # Ejecutar diariamente a la medianoche
  workflow_dispatch: # Permitir ejecución manual desde la interfaz de GitHub

jobs:
  ingestion:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl lxml

      # ---- EA1: Ejecución del script de ingesta ----
      - name: Ejecutar script de ingesta (EA1)
        run: |
          python src/ingestion.py

      - name: Subir artefactos EA1 (Base de Datos, Muestra y Auditoría)
        uses: actions/upload-artifact@v4
        with:
          name: evidencias-ingestion
          path: |
            src/db/ingestion.db
            src/xlsx/ingestion.xlsx
            src/static/auditoria/ingestion.txt

      # ---- EA2: Ejecución del script de preprocesamiento y limpieza ----
      - name: Ejecutar script de limpieza (EA2)
        run: |
          python src/cleaning.py
          echo "### 📊 Reporte de Auditoría EA2" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          cat src/static/auditoria/cleaning_report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Subir artefactos EA2 (Datos Limpios y Auditoría de Limpieza)
        uses: actions/upload-artifact@v4
        with:
          name: evidencias-cleaning
          path: |
            src/xlsx/cleaned_data.xlsx
            src/static/auditoria/cleaning_report.txt

      # ---- EA3: Ejecución del script de enriquecimiento ----
      - name: Ejecutar script de enriquecimiento (EA3)
        run: |
          python src/enrichement.py
          echo "### 📊 Reporte de Auditoría EA3" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          cat src/static/auditoria/enriched_report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Subir artefactos EA3 (Dataset Enriquecido y Auditoría)
        uses: actions/upload-artifact@v4
        with:
          name: evidencias-enrichment
          path: |
            src/xlsx/enriched_data.xlsx
            src/static/auditoria/enriched_report.txt

      # ---- Auto-commit Logging Documentación Viva ----
      - name: Commit Action Logs to MD
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/EA2_Cleaning.md docs/EA3_Enrichment.md
          git commit -m "docs: auto-update documentation with live execution logs [skip ci]" || echo "No changes to commit"
          git push
